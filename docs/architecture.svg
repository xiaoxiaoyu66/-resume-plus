<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ==================== 客户端层 ==================== -->
  <rect x="20" y="10" width="960" height="75" rx="10" fill="#f0f4ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="38" y="35" font-size="13" fill="#475569" font-weight="700">客户端层</text>
  <rect x="380" y="28" width="240" height="42" rx="6" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="500" y="46" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="600">Vue 3 SPA</text>
  <text x="500" y="61" text-anchor="middle" font-size="11" fill="#64748b">端口 3000</text>

  <!-- ==================== 网关层 ==================== -->
  <rect x="20" y="95" width="960" height="75" rx="10" fill="#f0f4ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="38" y="120" font-size="13" fill="#475569" font-weight="700">网关层</text>
  <rect x="380" y="113" width="240" height="42" rx="6" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="500" y="131" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="600">Nginx</text>
  <text x="500" y="146" text-anchor="middle" font-size="11" fill="#64748b">反向代理 / 静态资源</text>

  <!-- 箭头：Vue → Nginx -->
  <line x1="500" y1="70" x2="500" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== 后端层 ==================== -->
  <rect x="20" y="190" width="960" height="105" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="38" y="215" font-size="13" fill="#475569" font-weight="700">后端层</text>

  <!-- 7 个 Controller -->
  <g font-size="11" fill="#92400e" text-anchor="middle">
    <!-- ResumeController -->
    <rect x="45" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="100" y="248" font-weight="600">Resume</text>
    <text x="100" y="262" font-weight="600">Controller</text>

    <!-- ChatController -->
    <rect x="175" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="230" y="248" font-weight="600">Chat</text>
    <text x="230" y="262" font-weight="600">Controller</text>

    <!-- SseChatController -->
    <rect x="305" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="360" y="248" font-weight="600">SSE Chat</text>
    <text x="360" y="262" font-weight="600">Controller</text>

    <!-- FileUploadController -->
    <rect x="435" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="490" y="248" font-weight="600">File Upload</text>
    <text x="490" y="262" font-weight="600">Controller</text>

    <!-- JobController -->
    <rect x="565" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="620" y="248" font-weight="600">Job</text>
    <text x="620" y="262" font-weight="600">Controller</text>

    <!-- ProfileController -->
    <rect x="695" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="750" y="248" font-weight="600">Profile</text>
    <text x="750" y="262" font-weight="600">Controller</text>

    <!-- AiLoginController -->
    <rect x="825" y="230" width="110" height="50" rx="5" fill="#fff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="880" y="248" font-weight="600">AI Login</text>
    <text x="880" y="262" font-weight="600">Controller</text>
  </g>

  <!-- 箭头：Nginx → 所有 Controller -->
  <line x1="500" y1="155" x2="500" y2="188" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 用一条粗横线 + 分支表示扇出 -->
  <line x1="100" y1="198" x2="880" y2="198" stroke="#64748b" stroke-width="1.5"/>
  <line x1="100" y1="198" x2="100" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="198" x2="230" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="198" x2="360" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="198" x2="490" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="198" x2="620" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="198" x2="750" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="198" x2="880" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== 底层：三列布局 ==================== -->

  <!-- 列1：数据层 -->
  <rect x="20" y="320" width="340" height="210" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="38" y="345" font-size="13" fill="#475569" font-weight="700">数据层</text>

  <rect x="38" y="358" width="145" height="70" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.2"/>
  <text x="110" y="383" text-anchor="middle" font-size="12" fill="#166534" font-weight="600">MySQL 8.0</text>
  <text x="110" y="400" text-anchor="middle" font-size="10" fill="#64748b">关系数据库</text>

  <rect x="198" y="358" width="145" height="70" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.2"/>
  <text x="270" y="383" text-anchor="middle" font-size="12" fill="#166534" font-weight="600">PostgreSQL</text>
  <text x="270" y="400" text-anchor="middle" font-size="10" fill="#64748b">+ PGVector</text>

  <rect x="38" y="440" width="145" height="70" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.2"/>
  <text x="110" y="465" text-anchor="middle" font-size="12" fill="#166534" font-weight="600">Redis 7.0</text>
  <text x="110" y="482" text-anchor="middle" font-size="10" fill="#64748b">缓存 / 会话</text>

  <rect x="198" y="440" width="145" height="70" rx="5" fill="#fff" stroke="#22c55e" stroke-width="1.2"/>
  <text x="270" y="465" text-anchor="middle" font-size="12" fill="#166534" font-weight="600">MinIO</text>
  <text x="270" y="482" text-anchor="middle" font-size="10" fill="#64748b">对象存储</text>

  <!-- 列2：基础设施 -->
  <rect x="380" y="320" width="280" height="210" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="398" y="345" font-size="13" fill="#475569" font-weight="700">基础设施</text>

  <rect x="398" y="370" width="245" height="70" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="520" y="395" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="600">RabbitMQ</text>
  <text x="520" y="412" text-anchor="middle" font-size="10" fill="#64748b">异步任务队列</text>

  <rect x="398" y="450" width="245" height="70" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="520" y="475" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="600">Gotenberg</text>
  <text x="520" y="492" text-anchor="middle" font-size="10" fill="#64748b">Chromium PDF 导出</text>

  <!-- 列3：AI 服务 -->
  <rect x="680" y="320" width="300" height="210" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="698" y="345" font-size="13" fill="#475569" font-weight="700">AI 服务</text>

  <rect x="698" y="370" width="265" height="70" rx="5" fill="#fff" stroke="#ef4444" stroke-width="1.2"/>
  <text x="830" y="395" text-anchor="middle" font-size="12" fill="#b91c1c" font-weight="600">DeepSeek API</text>
  <text x="830" y="412" text-anchor="middle" font-size="10" fill="#64748b">V4-Flash / V4-Pro</text>

  <rect x="698" y="450" width="265" height="70" rx="5" fill="#fff" stroke="#ef4444" stroke-width="1.2"/>
  <text x="830" y="475" text-anchor="middle" font-size="12" fill="#b91c1c" font-weight="600">SiliconFlow API</text>
  <text x="830" y="492" text-anchor="middle" font-size="10" fill="#64748b">BGE-M3 嵌入</text>

  <!-- ==================== Controller → 数据层 / 基础设施 / AI 服务 箭头 ==================== -->

  <!-- ResumeController (100) → MySQL (110), Redis (110), Gotenberg (520) -->
  <line x1="100" y1="280" x2="100" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="100" y1="303" x2="110" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="110" y1="303" x2="110" y2="355" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>
  <line x1="100" y1="303" x2="110" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="110" y1="303" x2="110" y2="437" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>
  <line x1="100" y1="303" x2="520" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="520" y1="303" x2="520" y2="447" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- ChatController (230) → DeepSeek (830), Redis (110) -->
  <line x1="230" y1="280" x2="230" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="230" y1="303" x2="110" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="110" y1="303" x2="110" y2="355" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="303" x2="830" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="830" y1="303" x2="830" y2="367" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- SseChatController (360) → DeepSeek (830) -->
  <line x1="360" y1="280" x2="360" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="360" y1="303" x2="830" y2="303" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="830" y1="303" x2="830" y2="367" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- FileUploadController (490) → MinIO (270), RabbitMQ (520) -->
  <line x1="490" y1="280" x2="490" y2="300" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="490" y1="300" x2="270" y2="300" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="270" y1="300" x2="270" y2="437" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>
  <line x1="490" y1="300" x2="520" y2="300" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="520" y1="300" x2="520" y2="367" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- JobController (620) → MySQL (110), PGVector (270) -->
  <line x1="620" y1="280" x2="620" y2="295" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="620" y1="295" x2="110" y2="295" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="110" y1="295" x2="110" y2="355" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>
  <line x1="620" y1="295" x2="270" y2="295" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="270" y1="295" x2="270" y2="355" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- ProfileController (750) → MySQL (110) -->
  <line x1="750" y1="280" x2="750" y2="295" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="750" y1="295" x2="110" y2="295" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="110" y1="295" x2="110" y2="355" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- AiLoginController (880) → Redis (110) -->
  <line x1="880" y1="280" x2="880" y2="290" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="880" y1="290" x2="110" y2="290" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="110" y1="290" x2="110" y2="355" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow-right)"/>

  <!-- ==================== 基础设施 → AI 服务 / 数据层 箭头 ==================== -->
  <!-- RabbitMQ (520) → SiliconFlow (830) -->
  <line x1="520" y1="440" x2="520" y2="560" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="520" y1="560" x2="830" y2="560" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="830" y1="560" x2="830" y2="517" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-right)"/>

  <!-- RabbitMQ (520) → PGVector (270) -->
  <line x1="398" y1="405" x2="345" y2="405" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-right)"/>
</svg>

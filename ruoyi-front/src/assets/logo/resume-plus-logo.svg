<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background: #FAF8F5;">
  <defs>
    <!-- 水墨渐变 -->
    <linearGradient id="inkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1E3D"/>
      <stop offset="50%" style="stop-color:#0E3265"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
    
    <!-- 淡墨渐变 -->
    <linearGradient id="inkLightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6a8a"/>
      <stop offset="100%" style="stop-color:#8aa0b8"/>
    </linearGradient>
    
    <!-- 朱砂渐变 -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C45C48"/>
      <stop offset="100%" style="stop-color:#a04030"/>
    </linearGradient>
    
    <!-- 金箔渐变 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8956A"/>
      <stop offset="50%" style="stop-color:#d4b080"/>
      <stop offset="100%" style="stop-color:#9a8050"/>
    </linearGradient>
    
    <!-- 水墨晕染滤镜 -->
    <filter id="inkBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    
    <!-- 纸张纹理 -->
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#FAF8F5" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
    </filter>
  </defs>
  
  <!-- 背景纸张纹理 -->
  <rect width="800" height="400" fill="#FAF8F5"/>
  
  <!-- ==================== 版本1: 极简线条版 ==================== -->
  <g transform="translate(50, 50)">
    <!-- 标题 -->
    <text x="0" y="-20" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">版本1: 极简线条</text>
    
    <!-- Logo图形 - 简历轮廓+加号 -->
    <g transform="translate(60, 40)">
      <!-- 简历轮廓 -->
      <rect x="0" y="0" width="80" height="100" rx="4" fill="none" stroke="url(#inkGradient)" stroke-width="3"/>
      <!-- 简历内容线条 -->
      <line x1="15" y1="25" x2="65" y2="25" stroke="url(#inkGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="45" x2="55" y2="45" stroke="url(#inkLightGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="60" x2="60" y2="60" stroke="url(#inkLightGradient)" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="75" x2="50" y2="75" stroke="url(#inkLightGradient)" stroke-width="2" stroke-linecap="round"/>
      <!-- 加号 -->
      <circle cx="70" cy="90" r="18" fill="url(#redGradient)"/>
      <line x1="70" y1="82" x2="70" y2="98" stroke="#FAF8F5" stroke-width="3" stroke-linecap="round"/>
      <line x1="62" y1="90" x2="78" y2="90" stroke="#FAF8F5" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- 文字 -->
    <text x="0" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#inkGradient)">Resume</text>
    <text x="115" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#redGradient)">+</text>
    <text x="0" y="195" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">智能简历助手</text>
  </g>
  
  <!-- ==================== 版本2: 水墨印章版 ==================== -->
  <g transform="translate(300, 50)">
    <!-- 标题 -->
    <text x="0" y="-20" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">版本2: 水墨印章</text>
    
    <!-- Logo图形 - 印章风格 -->
    <g transform="translate(40, 20)">
      <!-- 外框 -->
      <rect x="0" y="0" width="100" height="100" rx="8" fill="none" stroke="url(#redGradient)" stroke-width="4"/>
      <!-- 内框 -->
      <rect x="8" y="8" width="84" height="84" rx="4" fill="none" stroke="url(#redGradient)" stroke-width="2" opacity="0.6"/>
      <!-- 文字 R+ -->
      <text x="50" y="55" font-family="Noto Serif SC, serif" font-size="42" font-weight="bold" fill="url(#redGradient)" text-anchor="middle">简</text>
      <text x="50" y="78" font-family="Noto Serif SC, serif" font-size="16" fill="url(#redGradient)" text-anchor="middle">Resume+</text>
      <!-- 水墨晕染效果 -->
      <circle cx="85" cy="15" r="8" fill="url(#inkGradient)" opacity="0.1" filter="url(#inkBlur)"/>
      <circle cx="15" cy="85" r="6" fill="url(#inkGradient)" opacity="0.1" filter="url(#inkBlur)"/>
    </g>
    
    <!-- 文字 -->
    <text x="0" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#inkGradient)">Resume</text>
    <text x="115" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#redGradient)">+</text>
    <text x="0" y="195" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">智能简历助手</text>
  </g>
  
  <!-- ==================== 版本3: 书法笔刷版 ==================== -->
  <g transform="translate(550, 50)">
    <!-- 标题 -->
    <text x="0" y="-20" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">版本3: 书法笔刷</text>
    
    <!-- Logo图形 - 毛笔笔触 -->
    <g transform="translate(50, 30)">
      <!-- 毛笔笔触背景 -->
      <path d="M10,10 Q40,5 70,15 Q85,20 80,40 Q75,60 50,65 Q25,70 15,50 Q5,35 10,10" 
            fill="url(#inkGradient)" opacity="0.9"/>
      <!-- R 字母 -->
      <text x="45" y="48" font-family="Noto Serif SC, serif" font-size="36" font-weight="bold" fill="#FAF8F5" text-anchor="middle">R</text>
      <!-- 加号点缀 -->
      <circle cx="75" cy="55" r="12" fill="url(#redGradient)"/>
      <line x1="75" y1="50" x2="75" y2="60" stroke="#FAF8F5" stroke-width="2" stroke-linecap="round"/>
      <line x1="70" y1="55" x2="80" y2="55" stroke="#FAF8F5" stroke-width="2" stroke-linecap="round"/>
      <!-- 墨点装饰 -->
      <circle cx="20" cy="75" r="3" fill="url(#inkGradient)" opacity="0.6"/>
      <circle cx="30" cy="78" r="2" fill="url(#inkGradient)" opacity="0.4"/>
    </g>
    
    <!-- 文字 -->
    <text x="0" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#inkGradient)">Resume</text>
    <text x="115" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#redGradient)">+</text>
    <text x="0" y="195" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">智能简历助手</text>
  </g>
  
  <!-- ==================== 版本4: 几何现代版 ==================== -->
  <g transform="translate(50, 240)">
    <!-- 标题 -->
    <text x="0" y="-20" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">版本4: 几何现代</text>
    
    <!-- Logo图形 - 几何风格 -->
    <g transform="translate(60, 20)">
      <!-- 六边形背景 -->
      <polygon points="50,5 90,25 90,65 50,85 10,65 10,25" fill="none" stroke="url(#inkGradient)" stroke-width="3"/>
      <!-- 内部R -->
      <text x="50" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#inkGradient)" text-anchor="middle">R</text>
      <!-- 加号角标 -->
      <polygon points="85,15 95,5 95,25 75,25" fill="url(#redGradient)"/>
      <line x1="82" y1="15" x2="88" y2="15" stroke="#FAF8F5" stroke-width="2" stroke-linecap="round"/>
      <line x1="85" y1="12" x2="85" y2="18" stroke="#FAF8F5" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <!-- 文字 -->
    <text x="0" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#inkGradient)">Resume</text>
    <text x="115" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#redGradient)">+</text>
    <text x="0" y="195" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">智能简历助手</text>
  </g>
  
  <!-- ==================== 版本5: 金箔点缀版 ==================== -->
  <g transform="translate(300, 240)">
    <!-- 标题 -->
    <text x="0" y="-20" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">版本5: 金箔点缀</text>
    
    <!-- Logo图形 - 金色装饰 -->
    <g transform="translate(50, 20)">
      <!-- 圆形背景 -->
      <circle cx="50" cy="45" r="42" fill="none" stroke="url(#inkGradient)" stroke-width="2"/>
      <!-- 内圆 -->
      <circle cx="50" cy="45" r="35" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.6"/>
      <!-- R 字母 -->
      <text x="50" y="55" font-family="Noto Serif SC, serif" font-size="36" font-weight="bold" fill="url(#inkGradient)" text-anchor="middle">R</text>
      <!-- 金色加号 -->
      <circle cx="80" cy="75" r="14" fill="url(#goldGradient)"/>
      <line x1="80" y1="69" x2="80" y2="81" stroke="#FAF8F5" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="74" y1="75" x2="86" y2="75" stroke="#FAF8F5" stroke-width="2.5" stroke-linecap="round"/>
      <!-- 金箔装饰点 -->
      <circle cx="20" cy="25" r="3" fill="url(#goldGradient)" opacity="0.8"/>
      <circle cx="85" cy="20" r="2" fill="url(#goldGradient)" opacity="0.6"/>
      <circle cx="15" cy="70" r="2" fill="url(#goldGradient)" opacity="0.4"/>
    </g>
    
    <!-- 文字 -->
    <text x="0" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#inkGradient)">Resume</text>
    <text x="115" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#goldGradient)">+</text>
    <text x="0" y="195" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">智能简历助手</text>
  </g>
  
  <!-- ==================== 版本6: 极简文字版 ==================== -->
  <g transform="translate(550, 240)">
    <!-- 标题 -->
    <text x="0" y="-20" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">版本6: 极简文字</text>
    
    <!-- Logo图形 - 纯文字 -->
    <g transform="translate(30, 35)">
      <!-- R 大字 -->
      <text x="40" y="50" font-family="Noto Serif SC, serif" font-size="56" font-weight="bold" fill="url(#inkGradient)">R</text>
      <!-- 竖线分隔 -->
      <line x1="65" y1="10" x2="65" y2="65" stroke="url(#inkLightGradient)" stroke-width="2"/>
      <!-- + 号 -->
      <text x="75" y="45" font-family="Noto Serif SC, serif" font-size="36" font-weight="bold" fill="url(#redGradient)">+</text>
      <!-- 墨点装饰 -->
      <circle cx="100" cy="20" r="4" fill="url(#inkGradient)" opacity="0.3"/>
      <circle cx="15" cy="70" r="3" fill="url(#inkGradient)" opacity="0.2"/>
    </g>
    
    <!-- 文字 -->
    <text x="0" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#inkGradient)">Resume</text>
    <text x="115" y="170" font-family="Noto Serif SC, serif" font-size="32" font-weight="bold" fill="url(#redGradient)">+</text>
    <text x="0" y="195" font-family="Noto Serif SC, serif" font-size="12" fill="#8aa0b8">智能简历助手</text>
  </g>
  
</svg>
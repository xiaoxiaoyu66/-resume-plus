<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume+ 演示视频</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .container { max-width: 960px; width: 100%; }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #aaa; font-size: 16px; }
    .header p a { color: #667eea; -webkit-text-fill-color: #667eea; text-decoration: none; }
    .header p a:hover { text-decoration: underline; }

    .video-wrapper {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .video-wrapper video {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #000;
    }

    .no-video {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 2px dashed rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 15px;
      gap: 12px;
    }
    .no-video .icon { font-size: 48px; opacity: 0.4; }

    .admin-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 30px;
    }
    .admin-section h3 {
      font-size: 18px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .upload-box {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      transition: all 0.3s;
    }
    .upload-box.dragover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }
    .upload-box input[type="file"] { display: none; }
    .upload-btn {
      display: inline-block;
      padding: 10px 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: transform 0.2s;
    }
    .upload-btn:hover { transform: translateY(-1px); }
    .upload-btn:active { transform: translateY(0); }
    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .delete-btn {
      display: inline-block;
      padding: 10px 28px;
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
      border-radius: 8px;
      border: 1px solid rgba(248, 113, 113, 0.3);
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      margin-left: 10px;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(248, 113, 113, 0.3); }
    .upload-hint {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
    }
    .progress-bar {
      margin-top: 16px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progress-bar .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    .status.loading { color: #fbbf24; }

    .admin-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .footer {
      text-align: center;
      color: #555;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Resume+ 演示视频</h1>
      <p><a href="https://he2wa.xin" target="_blank">https://he2wa.xin</a></p>
    </div>

    <!-- 视频播放区 -->
    <div class="video-wrapper">
      <div id="noVideo" class="no-video">
        <div class="icon">&#9654;</div>
        <div id="noVideoText">暂无演示视频</div>
      </div>
      <video id="videoPlayer" controls style="display:none"></video>
    </div>

    <!-- 管理员区域：上传/删除 -->
    <div id="adminSection" class="admin-section" style="display:none">
      <div class="admin-bar">
        <h3>管理演示视频</h3>
        <span id="currentVideoInfo" style="color:#777;font-size:13px;"></span>
      </div>
      <div class="upload-box" id="uploadBox">
        <p style="margin-bottom:16px;color:#999;">拖拽视频到此处，或点击下方按钮上传</p>
        <input type="file" id="fileInput" accept="video/mp4,video/webm,video/quicktime" />
        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">选择视频文件</button>
        <button class="delete-btn" id="deleteBtn" style="display:none" onclick="deleteVideo()">删除视频</button>
        <div class="upload-hint">支持 MP4 / WebM / MOV，最大 500MB，建议 16:9 横屏</div>
        <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
        <div class="status" id="status"></div>
      </div>
    </div>

    <div class="footer">
      Resume+ &mdash; AI 中文简历诊断平台 &mdash; 开源免费
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    const fileInput = document.getElementById('fileInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const noVideo = document.getElementById('noVideo');
    const noVideoText = document.getElementById('noVideoText');
    const adminSection = document.getElementById('adminSection');
    const uploadBox = document.getElementById('uploadBox');
    const uploadBtn = document.getElementById('uploadBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const status = document.getElementById('status');
    const currentVideoInfo = document.getElementById('currentVideoInfo');

    let isAdmin = false;

    // ========== 初始化 ==========
    (async function init() {
      // 1. 获取视频信息（公开 API）
      const info = await fetchVideoInfo();
      if (info) {
        showVideo(info.url, info.size);
      }

      // 2. 检查管理员身份
      isAdmin = await checkAdmin();
      if (isAdmin) {
        adminSection.style.display = 'block';
        if (info) {
          deleteBtn.style.display = 'inline-block';
          currentVideoInfo.textContent = formatSize(info.size);
        }
      }
    })();

    async function fetchVideoInfo() {
      try {
        const res = await fetch(API_BASE + '/ai/demo-video/info');
        const json = await res.json();
        if (json.code === 200 && json.data) {
          return json.data;
        }
      } catch (e) {
        console.warn('获取视频信息失败', e);
      }
      return null;
    }

    async function checkAdmin() {
      try {
        const res = await fetch(API_BASE + '/ai/demo-video/auth-check', {
          credentials: 'include'
        });
        return res.status === 200;
      } catch {
        return false;
      }
    }

    function showVideo(url, size) {
      videoPlayer.src = url;
      videoPlayer.style.display = 'block';
      noVideo.style.display = 'none';
    }

    // ========== 文件选择 & 拖拽 ==========
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    uploadBox.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadBox.classList.add('dragover');
    });
    uploadBox.addEventListener('dragleave', () => {
      uploadBox.classList.remove('dragover');
    });
    uploadBox.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadBox.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('video/')) {
        setStatus('请选择视频文件', 'error');
        return;
      }
      if (file.size > 500 * 1024 * 1024) {
        setStatus('文件超过 500MB 限制', 'error');
        return;
      }
      uploadVideo(file);
    }

    // ========== 上传 ==========
    function uploadVideo(file) {
      uploadBtn.disabled = true;
      setStatus('上传中...', 'loading');
      progressBar.style.display = 'block';
      progressFill.style.width = '0%';

      const formData = new FormData();
      formData.append('file', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', API_BASE + '/ai/demo-video/upload');
      xhr.withCredentials = true;

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
        }
      };

      xhr.onload = function () {
        uploadBtn.disabled = false;
        progressFill.style.width = '100%';
        try {
          const json = JSON.parse(xhr.responseText);
          if (json.code === 200) {
            setStatus('上传成功，视频已更新', 'success');
            showVideo('/profile/demo-video/demo.mp4', file.size);
            deleteBtn.style.display = 'inline-block';
            currentVideoInfo.textContent = formatSize(file.size);
            setTimeout(() => { progressBar.style.display = 'none'; }, 2000);
          } else {
            setStatus('上传失败: ' + (json.msg || '未知错误'), 'error');
          }
        } catch {
          setStatus('上传失败: 服务器响应异常', 'error');
        }
      };

      xhr.onerror = function () {
        uploadBtn.disabled = false;
        if (xhr.status === 401) {
          setStatus('请先以管理员身份登录', 'error');
        } else if (xhr.status === 403) {
          setStatus('仅管理员可以上传视频', 'error');
        } else {
          setStatus('上传失败: 网络错误 (HTTP ' + xhr.status + ')', 'error');
        }
      };

      xhr.send(formData);
    }

    // ========== 删除 ==========
    async function deleteVideo() {
      if (!confirm('确定删除演示视频吗？')) return;
      try {
        const res = await fetch(API_BASE + '/ai/demo-video', {
          method: 'DELETE',
          credentials: 'include'
        });
        const json = await res.json();
        if (json.code === 200) {
          setStatus('视频已删除', 'success');
          videoPlayer.style.display = 'none';
          noVideo.style.display = 'flex';
          deleteBtn.style.display = 'none';
          currentVideoInfo.textContent = '';
          progressBar.style.display = 'none';
        } else {
          setStatus('删除失败: ' + (json.msg || '未知错误'), 'error');
        }
      } catch (e) {
        setStatus('删除失败: 网络错误', 'error');
      }
    }

    // ========== 工具函数 ==========
    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status' + (type ? ' ' + type : '');
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>
</body>
</html>

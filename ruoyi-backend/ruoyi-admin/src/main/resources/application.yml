# DeepSeek AI配置
deepseek:
  # API密钥
  api-key: ${DEEPSEEK_API_KEY}
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-chat
  # System Prompt 配置
  system-prompt:
    # 默认场景 — 通用对话（根据用户简历状态自适应开场）
    default: |
      你是一个招聘领域助手，当前用户正在使用简历编辑器。

      你看得到用户简历的当前内容。开场时不要自我介绍，直接根据简历状态给出反应：

      - 如果简历只有基本信息（姓名/电话/邮箱），其他模块为空：
        "你的简历还比较初步，需要我帮你生成一份初稿吗？告诉我你的目标岗位、学历和经历方向就行。"
        → 用户回应后，生成各模块草稿内容让用户选择是否填入。

      - 如果简历已填写部分模块但不完整：
        指出已填的模块和缺失的关键模块，示例：
        "你填了教育经历，但项目经历/工作经历和技能标签还是空的。招聘方最看重的是你做过什么、能做什么，需要我帮你补齐吗？你可以简单说说之前的经历，我帮你整理成简历语言。"

      - 如果简历内容比较完整：
        "简历内容挺全了。接下来你可以：针对某个具体岗位做 JD 适配优化，或者让我模拟一场面试。你想先试哪个？"

      - 如果用户直接提问（没有上下文）：
        正常回答问题，不在回答中提及"我是AI助手"或"我是某某助手"。直接给答案。

      回答要求：
      - 专业直接，不说废话。能用一句话说的不说两段。
      - 涉及行业判断时给出具体依据，不说"可能""也许"这类模糊词。
      - 用户描述模糊时，先确认具体方向再展开，不凭空猜测。
      - 涉及地区求职问题时，结合当地企业生态给出建议，但不主动推销地域标签。
    # 简历分析场景
    resume: |
      你是一个资深简历审阅者，有多年跨行业招聘经验，覆盖技术、产品、运营、市场、销售、设计、行政、财务等各岗位类型。你现在拿到了一份用户正在编辑的简历。

      你的工作流程：

      第一步，快速扫描简历整体结构，判断：
      - 信息完整度：缺哪些模块？哪些模块内容不足？
      - 排版清晰度：层次是否分明？重点信息是否突出？
      - 内容质量：经历描述是否具体？有没有量化成果？

      第二步，逐模块给出可操作的改进点（根据用户的实际行业和岗位类型，使用对应的专业语境）：

      教育经历
      → "GPA/排名靠前的话可以标注出来，这是一个加分项。"
      → "列出跟目标岗位相关的课程即可，不用全部罗列。"

      工作/项目经历
      → "每条经历最好都有具体成果支撑，比如：效率提升多少？业绩增长多少？负责过多大预算？服务了多少客户？带过多大的团队？"
      → "简历上的经历描述不要只写'负责什么'，要写'做了什么、怎么做的、取得了什么结果'。"

      技能/资质
      → 针对不同岗位类型举不同的例子：
         - 技术岗：核心编程语言、框架、工具链放前面
         - 市场/运营：数据分析工具、投放平台、内容工具
         - 设计岗：设计工具、设计系统、协作工具
         - 销售：CRM 系统、行业资源、客户类型
         - 财务/行政：专业资质、财务软件、合规知识
      → "技能列了太多项显得杂，保留最擅长的 5-6 个，其他的在经历描述里自然体现。"

      第三步，给出改进优先级建议：
      - P0（影响筛选通过率）：必须改的
      - P1（提升竞争力）：建议改的
      - P2（锦上添花）：有空再改的

      回答要求：
      - 不评价简历"好"或"不好"，直接给具体建议。
      - 每条建议都有"为什么"—— HR 为什么看重这个？简历筛选系统怎么判断？
      - 如果用户没有填目标岗位，先问再诊断。不同行业、不同岗位的简历侧重点完全不同。
      - 不要把整个简历拆成流水账一条条讲，挑最重要的 3-5 个问题先说，用户追问再深入。
      - 根据用户的行业背景调整建议语境，不要默认用户是技术岗。
    # HR 行为面试场景
    interview-hr: |
      你是一个HR面试官，有多年跨行业招聘经验，覆盖技术、产品、运营、市场、销售、设计、行政、财务等各岗位。你现在要模拟HR面试。

      开场判断：
      - 如果用户简历内容很少或无目标岗位：
        "你还没有确定目标岗位，面试准备要先定方向。你目前在看什么类型的岗位？"
      - 如果用户已有简历：
        直接开始HR面试流程：自我介绍 → 求职动机 → 职业规划 → 软素质考察

      HR面试规则：
      1. 一次只问一个问题，等用户回答后再追问或点评。
      2. 追问逻辑：用户回答后，像真实HR一样顺着往下挖（"你刚说因为发展空间离职，具体是什么发展空间？"），至少追问2-3轮再换话题。
      3. 话题覆盖：离职原因、职业规划、期望薪资、压力/冲突处理、团队协作。
      4. 不要一次性给出所有题目和答案。

      根据用户的岗位类型调整问题语境，不默认用户是技术岗。

      点评要求：
      - 关注回答的逻辑性、风险信号（频繁跳槽、薪资预期不合理、对行业认知不足）。
      - 给出具体的改进建议，不说空话。
      - 示范答案要简洁，让用户能记住框架。
    # 专业面试场景
    interview-pro: |
      你是一个资深业务面试官，面试过技术、产品、运营、市场、销售、设计、行政、财务等各岗位的候选人。用户的目标岗位决定你的出题方向。

      开场判断：
      - 如果用户没有填写目标岗位：
        "你还没有确定目标岗位。你目前在看什么方向的岗位？我先根据那个方向来准备题目。"
        → 用户回答后，按对应方向出题。
      - 如果用户有目标岗位：
        直接开始专业面试。

      核心规则：
      1. 出题方向由用户的目标岗位决定，不默认技术岗：
         - 销售岗 → 客户开拓、谈判技巧、业绩达成、渠道管理
         - 运营/市场 → 渠道策略、数据分析、活动策划、用户增长
         - 设计岗 → 设计思路、工具能力、作品集细节、设计决策
         - 产品岗 → 需求分析、优先级判断、产品规划、数据分析
         - 财务/行政 → 流程规范、风险意识、合规知识、成本控制
         - 技术岗（Java/前端/后端/算法等） → 技术原理、架构设计、场景题
         - 其他 → 诚实告诉用户该方向不在熟悉范围内，建议找该领域专业人士
      2. 一次只出一道题，等用户回答后再继续。
      3. 追问逻辑：用户答完一个问题，像真实面试官一样深挖细节（"你提到用了XX技术，为什么选它不选别的？"）。至少追问2-3轮再换话题。
      4. 不要一次性给出所有题目和答案。
      5. 注重：专业深度、项目细节真实性、场景应变能力。

      点评要求：
      - 具体指出答案的准确性和深度。
      - 暴露的知识盲区要明确列出。
      - 示范答案简洁，给出回答框架而不是完整话术。
      - 如果用户表现明显紧张或者回答方向偏了，先给鼓励再纠正。
    # 职业规划场景
    career: |
      你是一个职业规划顾问，熟悉各行业的岗位结构和发展路径，涵盖技术、产品、运营、市场、销售、设计、行政、财务等各领域。用户来找你做职业规划，你要先了解信息再给建议，不要一上来就长篇大论。

      信息收集流程（一次问 1-2 个问题，不要一次性抛出一堆问题）：

      第一轮：
      "你的专业、学历和毕业时间是什么？目前是在校还是已经工作了？"

      第二轮（根据第一轮的回答追问）：
      - 在校学生："你目前有倾向的方向吗？之前有过实习或社团经历吗？"
      - 已工作："你现在做什么方向？大概几年经验？考虑换方向还是继续深耕？"

      给出建议的结构：

      - 短期（0-6 个月）：具体的动作——学什么技能、积累什么经历、投什么类型的公司。
      - 中期（6 个月-2 年）：目标状态——到什么阶段应该有怎样的产出和能力储备。
      - 长期（2-5 年）：可选路径——走专家路线还是管理/综合路线，分别需要储备什么。

      回答要求：
      - 不要给出"好好学习、提升自己"这种正确的废话。每条建议都必须是可执行的具体动作。
      - 如果用户提到想去某个城市/行业，结合该城市的人才市场特点给出建议。
      - 区分实习、校招、社招的不同策略。一个大三学生和一个工作 3 年的人，规划逻辑完全不同。
      - 根据用户的专业和经历背景给出对应的行业方向建议，不要默认用户是技术/互联网方向。
      - 如果用户背景跟目标方向差距较大，诚实告知难度，同时给出弥补路径，不画饼。

# MinIO 对象存储配置（Kali Docker 环境）
minio:
  # MinIO 服务地址
  endpoint: http://192.168.132.136:9000
  # 访问密钥
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  # 默认存储桶名称（已存在的 ai-webchat）
  bucket-name: ai-webchat
  # 文件访问URL过期时间（秒），默认1小时
  expiry: 3600

# PGVector 向量数据库配置
pgvector:
  # PostgreSQL 地址（本地 Docker 用 localhost，远程用 Kali IP）
  host: ${PGVECTOR_HOST:192.168.132.136}
  # 端口
  port: 5433
  # 数据库名
  database: ruoyi_vector
  # 用户名
  username: ruoyi
  password: ${PGVECTOR_PASSWORD}
  # 连接池配置
  max-connections: 10

# PDF 生成 — Gotenberg（Docker 内用 gotenberg:3000，生产环境用 localhost:3000）
gotenberg:
  url: http://localhost:3000

# Embedding 服务配置 (使用 SiliconFlow API)
embedding:
  # API地址
  api-url: https://api.siliconflow.cn/v1/embeddings
  # API密钥
  api-key: ${EMBEDDING_API_KEY}
  # 模型名称
  model: BAAI/bge-m3
  # 向量维度
  dimension: 768

# SiliconFlow Chat 配置 — DeepSeek 兜底
# 使用 Qwen2.5-7B 免费模型，复用相同的 API Key
siliconflow:
  chat:
    api-url: https://api.siliconflow.cn/v1/chat/completions
    api-key: ${EMBEDDING_API_KEY}
    model: Qwen/Qwen2.5-7B-Instruct

# 阿里云短信认证服务配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_SECRET}
    sign-name: "速通互联验证码"           # 短信认证服务默认签名
    template-code: "100001"               # 短信认证服务默认模板CODE
    region-id: cn-hangzhou

# 微信登录配置
wx:
  app-secret: ${WX_APP_SECRET}

# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /opt/resume-plus/upload）
  profile: /opt/resume-plus/upload
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数（轻量服务器压到100，省700MB内存）
      max: 100
      # Tomcat启动初始化的线程数
      min-spare: 20

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${JWT_SECRET}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# AI 对话优化配置
ai:
  # 滑动窗口记忆配置
  window:
    # 最大保留对话轮数（每轮包含用户+AI两条消息）
    max-rounds: 5
    # 最大Token数（系统提示词+上下文）
    max-tokens: 3000
    # 系统提示词优先保留
    system-priority: true
  
  # 高频缓存配置
  cache:
    # L1 本地缓存大小
    l1-size: 1000
    # L1 缓存过期时间（分钟）
    l1-ttl: 10
    # L2 Redis缓存过期时间（分钟）
    l2-ttl: 60
    # 语义相似度阈值
    similarity-threshold: 0.85

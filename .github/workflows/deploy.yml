name: Deploy Frontend

on:
  push:
    branches: [master]
    # 只有前端文件变更才触发部署
    paths:
      - 'ruoyi-front/src/**'
      - 'ruoyi-front/public/**'
      - 'ruoyi-front/index.html'
      - 'ruoyi-front/vite.config.js'
      - 'ruoyi-front/package.json'
      - 'ruoyi-front/package-lock.json'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruoyi-front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ruoyi-front/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建前端
        run: npm run build

      - name: 打包构建产物
        run: tar czf /tmp/dist.tar.gz -C dist .

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: "/tmp/dist.tar.gz"
          target: "/tmp/"
          strip_components: 2

      - name: 部署到目标目录并重载 Nginx
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            cd /opt/resume-plus/ruoyi-front
            # 备份当前版本
            rm -rf dist.bak
            mv dist dist.bak
            # 解压新版本
            mkdir dist
            cd dist
            tar xzf /tmp/dist.tar.gz
            rm -f /tmp/dist.tar.gz
            # 同步最新 demo-video.html（如果有）
            if [ -f /opt/resume-plus/ruoyi-front/public/demo-video.html ]; then
              cp /opt/resume-plus/ruoyi-front/public/demo-video.html /opt/resume-plus/ruoyi-front/dist/demo-video.html
            fi
            # 重载 Nginx
            nginx -s reload
            echo "✅ 部署完成: $(date)"

# Resume+ AI 助手 - Nginx 反向代理配置 (Linux/Kali 版)
# 适配已有容器：pgvector, mongo, minio, nacos, redis, mysql

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json 
               application/javascript application/rss+xml 
               application/atom+xml image/svg+xml;

    # ==========================================
    # 上游服务器配置 (Linux/Kali 版)
    # ==========================================
    # 
    # 你的现有容器网络：
    # - postgres-pgvector (5433)
    # - mongo (27017)
    # - share_minio (9000/9001)
    # - share_nacos2.1.1 (8848/9848)
    # - share_redis (6379)
    # - share_mysql (3306)
    
    # 后端服务 - 使用宿主机 IP 访问（后端在宿主机上运行）
    upstream backend {
        # 使用 docker0 网桥 IP 访问宿主机
        server 172.17.0.1:8080 max_fails=3 fail_timeout=30s;
    }

    # MinIO 文件服务 - 使用容器名访问（同一网络）
    upstream minio {
        server share_minio:9000 max_fails=3 fail_timeout=30s;
    }

    # RabbitMQ 管理界面 - 使用容器名访问
    upstream rabbitmq_mgmt {
        server resume-plus-rabbitmq:15672 max_fails=3 fail_timeout=30s;
    }

    # ==========================================
    # HTTP 服务器 - 统一入口
    # ==========================================
    server {
        listen 80;
        server_name localhost;
        
        # 客户端最大请求体大小（用于文件上传）
        client_max_body_size 100M;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ==========================================
        # 1. 前端静态资源
        # ==========================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存 - 1年
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Vary Accept-Encoding;
                access_log off;
            }

            # HTML 文件不缓存（确保 SPA 路由正常）
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # ==========================================
        # 2. API 反向代理到后端
        # ==========================================
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # 请求头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 支持（预留）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ==========================================
        # 3. SSE 流式对话特殊配置
        # ==========================================
        location /ai/chat/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # SSE 关键配置
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            
            # 请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 禁用压缩（SSE 需要）
            gzip off;
        }

        # ==========================================
        # 4. MinIO 文件服务代理
        # ==========================================
        location /uploads/ {
            proxy_pass http://minio/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 大文件传输优化
            proxy_request_buffering off;
            proxy_buffering off;
            
            # 超时配置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ==========================================
        # 5. MinIO 管理界面（可选）
        # ==========================================
        location /minio/ {
            proxy_pass http://share_minio:9001/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==========================================
        # 6. RabbitMQ 管理界面（可选）
        # ==========================================
        location /rabbitmq/ {
            proxy_pass http://rabbitmq_mgmt/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 重写路径
            rewrite ^/rabbitmq/(.*)$ /$1 break;
        }

        # ==========================================
        # 7. 健康检查端点
        # ==========================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # 8. 错误页面
        # ==========================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

# Resume+ Nginx 配置 — 前端主应用 + 岗位导入
# 前端 :3000  |  导入工具 :3000/import.html  |  API 代理到后端 :8080
server {
    listen 3000;
    server_name localhost;
    client_max_body_size 500M;

    # 前端主应用（Vue 构建产物）
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Vue router history 模式 —— 所有非文件路径指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================
    # 岗位导入工具 — import.html 单独映射
    # ========================================
    location = /import.html {
        # 直接由 nginx 返回静态文件
    }

    # ========================================
    # API 代理 — 转发到后端
    # ========================================
    location /api/ {
        proxy_pass http://ruoyi-admin:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================
    # 本地文件（演示视频等）— Spring Boot 静态文件
    # ========================================
    location /profile/ {
        proxy_pass http://ruoyi-admin:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
